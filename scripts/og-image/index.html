<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>OG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,600..750,0..30,0..1;1,9..144,600..700,0..60,0..1&family=Manrope:wght@400..600&display=swap"
    rel="stylesheet">
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #FBF6EE;
      font-family: "Manrope", ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
      color: #2A1320;
      -webkit-font-smoothing: antialiased;
    }

    .og {
      position: relative;
      width: 1200px;
      height: 630px;
      padding: 68px 80px;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 48px;
      background:
        radial-gradient(1000px 700px at 88% 12%, rgba(217, 183, 196, 0.55), rgba(251, 246, 238, 0) 60%),
        radial-gradient(900px 700px at -10% 105%, rgba(212, 220, 200, 0.45), rgba(251, 246, 238, 0) 55%),
        #FBF6EE;
    }

    .og::before,
    .og::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      pointer-events: none;
    }

    .og::before {
      width: 460px;
      height: 460px;
      top: -180px;
      right: -160px;
      background: rgba(217, 183, 196, 0.32);
      filter: blur(6px);
    }

    .og::after {
      width: 340px;
      height: 340px;
      bottom: -140px;
      left: -140px;
      background: rgba(212, 220, 200, 0.32);
      filter: blur(6px);
    }

    .frame {
      position: absolute;
      inset: 26px;
      border: 1px solid rgba(74, 30, 58, 0.14);
      border-radius: 34px;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 2;
      width: 640px;
      flex-shrink: 0;
    }

    .eyebrow {
      font-family: "Manrope", sans-serif;
      text-transform: uppercase;
      font-size: 14px;
      letter-spacing: 0.22em;
      color: #6B2C4F;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    .eyebrow .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #B98099;
    }

    h1 {
      font-family: "Fraunces", "Iowan Old Style", Georgia, serif;
      font-weight: 700;
      font-size: 64px;
      line-height: 1.02;
      letter-spacing: -0.03em;
      color: #2A1320;
      margin: 20px 0 0 0;
      font-variation-settings: "opsz" 144, "SOFT" 25, "WONK" 0;
    }

    h1 .italic {
      font-style: italic;
      color: #4A1E3A;
      font-variation-settings: "opsz" 144, "SOFT" 100, "WONK" 1;
      font-weight: 600;
    }

    .tag {
      margin-top: 22px;
      font-family: "Manrope", sans-serif;
      font-size: 19px;
      line-height: 1.45;
      color: #4A3C43;
      max-width: 560px;
    }

    .brand {
      margin-top: 34px;
      display: flex;
      align-items: center;
      gap: 14px;
      font-family: "Manrope", sans-serif;
    }

    .brand .name {
      font-family: "Fraunces", serif;
      font-size: 22px;
      font-weight: 600;
      color: #2A1320;
      letter-spacing: -0.01em;
    }

    .brand .sep {
      width: 5px;
      height: 5px;
      border-radius: 999px;
      background: #B98099;
    }

    .brand .locale {
      font-size: 13px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #6B2C4F;
      font-weight: 600;
    }

    .art {
      position: relative;
      width: 320px;
      height: 420px;
      z-index: 2;
      flex-shrink: 0;
    }

    .art .card {
      position: absolute;
      inset: 0;
      background: #4A1E3A;
      border-radius: 44px;
      box-shadow:
        0 30px 60px -20px rgba(74, 30, 58, 0.35),
        0 12px 24px -12px rgba(74, 30, 58, 0.18);
      overflow: hidden;
    }

    .art .card .glow {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 30% 20%, rgba(185, 128, 153, 0.55), rgba(74, 30, 58, 0) 60%);
    }

    .art .card .kite {
      position: absolute;
      top: 46%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 62%;
      height: auto;
      filter: drop-shadow(0 12px 30px rgba(0, 0, 0, 0.28));
    }

    .art .card .ribbon {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 40%;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div class="og">
    <div class="frame"></div>
    <div class="content">
      <span class="eyebrow"><span class="dot"></span>A boutique child life practice</span>
      <h1>Support for the <span class="italic">emotional&nbsp;side</span> of medical care.</h1>
      <p class="tag">Boutique child life support for children, teens, siblings, and caregivers navigating medical
        experiences.</p>
      <div class="brand">
        <span class="name">A Child&rsquo;s Perspective</span>
        <span class="sep"></span>
        <span class="locale">Child Life Support · Colorado</span>
      </div>
    </div>
    <div class="art">
      <div class="card">
        <div class="glow"></div>
        <svg class="ribbon" viewBox="0 0 360 200" preserveAspectRatio="none" aria-hidden="true">
          <defs>
            <linearGradient id="rib" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#D9B7C4" />
              <stop offset="100%" stop-color="#A9B89A" />
            </linearGradient>
          </defs>
          <path d="M -20 130 C 70 90, 150 170, 230 120 S 380 120, 400 60" stroke="url(#rib)" stroke-width="26"
            stroke-linecap="round" fill="none" opacity="0.7" />
        </svg>
        <img class="kite" src="./Logo.png" alt="" />
      </div>
    </div>
  </div>
</body>

</html>
